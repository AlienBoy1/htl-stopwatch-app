<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var key = 'htl-stopwatch-color-scheme';
        var theme = 'dark';
        try {
          var stored = localStorage.getItem(key);
          if (stored === 'light' || stored === 'dark') theme = stored;
        } catch (e) {}
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.style.colorScheme = theme;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#09090b' : '#fafafa');
      })();
    </script>
    <link rel="icon" type="image/png" href="/icons/htl_stopwatch_icon.png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/icons/htl_stopwatch_icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta
      name="description"
      content="Cronómetro industrial para medición de ciclos de paletizado de cajas. PWA offline."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HTL StopWatch" />
    <title>HTL StopWatch — Cronómetro de Paletizado</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
